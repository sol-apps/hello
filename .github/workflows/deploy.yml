name: Deploy to solhann.net

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" > ~/.ssh/known_hosts 2>/dev/null

      # Deploy key is jailed to `rrsync /var/www/apps`, so the target is RELATIVE: hello/ -> /var/www/apps/hello/
      - name: Deploy via rsync
        run: |
          rsync -rlptz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            --exclude '.git/' --exclude '.github/' --exclude 'README.md' \
            ./ "sol@${{ secrets.SERVER_IP }}:hello/"
